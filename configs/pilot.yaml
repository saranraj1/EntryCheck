# ExplainCheck — Pilot configuration
# Purpose: Migrate Phase 0 synthetic pilot into the package and validate reproduction.
# Label: infrastructure-pilot — NOT confirmatory
# Results from this config must not be interpreted as confirmatory evidence.

inherits: "protocol-v1.yaml"

run_label: "pilot"
status: "infrastructure-pilot"

# Synthetic data only — real datasets are stage 6
dataset_mode: "synthetic"

synthetic:
  generator: "linear_logit"
  n_per_seed: 3000
  n_features: 8
  true_coefficients: [1.50, -1.20, 0.90, -0.70, 0.0, 0.0, 0.0, 0.0]
  intercept: -0.15
  feature_names: ["x1", "x2", "x3", "x4", "x5", "x6", "x7", "x8"]
  train_fraction: 0.80

seeds: [11, 23, 37, 41, 53, 67, 71, 83, 97, 101]  # all 10 frozen seeds

sample_requirements:
  evaluation_sizes: [50, 100, 200]
  min_stability_perturbations_per_sample: 20
  min_bootstrap_replicates: 1000

models:
  - family: logistic_regression
    hyperparameters:
      steps: 1800
      lr: 0.12
      l2: 0.001

explainers:
  - name: exact_linear
  - name: randomized_negative_control

metrics:
  fidelity:
    - name: deletion_fidelity_aopc
      k_values: [3]
  stability:
    variants: [top_k_jaccard]
    k_values: [3]
    prediction_preservation: true

# Phase 0 reproduction tolerance
reproduction_tolerance:
  roc_auc_mean: 0.878
  roc_auc_tolerance: 0.005
  fidelity_exact_n200: 1.764
  fidelity_tolerance: 0.01
  stability_exact_n200: 0.957
  stability_tolerance: 0.01

output_dir: "artifacts/pilot"
