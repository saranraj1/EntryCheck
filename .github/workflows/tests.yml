name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  unit-and-property:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run unit tests
        run: uv run pytest tests/unit/ -m unit -v --tb=short

      - name: Run property tests
        run: uv run pytest tests/property/ -m property -v --tb=short

      - name: Run golden tests
        run: uv run pytest tests/golden/ -m golden -v --tb=short

      - name: Coverage report
        run: uv run pytest tests/unit/ tests/property/ tests/golden/ --cov=src/explaincheck --cov-report=term-missing

  scientific:
    runs-on: ubuntu-latest
    needs: unit-and-property
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run scientific validation tests
        run: uv run pytest tests/scientific/ -m scientific -v --tb=short
