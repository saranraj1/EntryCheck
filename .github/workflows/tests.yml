name: Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  unit-and-property:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --locked --extra dev

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

      - name: Ruff lint
        run: uv run ruff check src/ tests/

      - name: Mypy type check
        run: uv run mypy src/explaincheck/

      - name: Run unit tests
        run: uv run pytest tests/unit/ -v --tb=short

      - name: Run property tests
        run: uv run pytest tests/property/ -v --tb=short

      - name: Run golden tests
        run: uv run pytest tests/golden/ -v --tb=short

      - name: Run integration tests
        run: uv run pytest tests/integration/ -v --tb=short

      - name: Test-ID inventory hash
        run: |
          uv run python scripts/compute_test_id_hash.py | tee ci-test-id-hash.txt
          echo "hash=$(cat ci-test-id-hash.txt | grep 'test-ID sha256' | awk '{print $NF}')" >> $GITHUB_OUTPUT
        id: test_hash

      - name: Full test run with counts
        run: uv run pytest tests/ -q

      - name: Artifact validation
        run: uv run explaincheck validate-stage3-artifacts

      - name: Coverage report
        run: uv run pytest tests/unit/ tests/property/ tests/golden/ --cov=src/explaincheck --cov-report=term-missing

      - name: Upload test-ID hash artifact (DR-008 §7)
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-test-id-hash-${{ github.sha }}
          path: ci-test-id-hash.txt
          retention-days: 90

  scientific:
    runs-on: ubuntu-latest
    needs: unit-and-property
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --locked --extra dev

      - name: Run scientific validation tests
        run: uv run pytest tests/scientific/ -v --tb=short --ignore=tests/scientific 2>/dev/null || echo "No scientific tests yet"
