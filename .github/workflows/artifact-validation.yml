name: Artifact Validation

# Verifies SHA-256 checksums for frozen artifact directories.
# Triggered on pushes to main to guard confirmatory artifacts.

on:
  push:
    branches: [main]
    paths:
      - "artifacts/**"

jobs:
  validate-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Validate pilot artifacts
        if: always()
        run: |
          if [ -f artifacts/pilot/run-manifest.json ]; then
            uv run explaincheck validate-artifacts --dir artifacts/pilot/
          else
            echo "No pilot manifest yet — skipping"
          fi

      - name: Validate confirmatory artifacts (MUST NOT FAIL)
        run: |
          if [ -f artifacts/confirmatory/run-manifest.json ]; then
            uv run explaincheck validate-artifacts --dir artifacts/confirmatory/
          else
            echo "No confirmatory manifest yet — skipping"
          fi

      - name: Guard: confirmatory artifacts must not be overwritten
        run: |
          # Check git diff to ensure no confirmatory artifact has been modified
          if git diff --name-only HEAD~1 HEAD | grep -q "^artifacts/confirmatory/"; then
            echo "[GUARD] Confirmatory artifact was modified — FAIL"
            exit 1
          else
            echo "[GUARD] No confirmatory artifact modified — OK"
          fi
        continue-on-error: false
